services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financialcontrol-sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: